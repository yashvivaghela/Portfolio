<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Yashvi Vaghela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f1117;
    --bg-card: #161922;
    --accent: #e3b23c;
    --accent-dim: #e3b23c33;
    --accent2: #e3b23c;
    --accent2-dim: #e3b23c26;
    --text: #e6e8ee;
    --text-muted: #8b93a7;
    --border: #262b38;
    --sans: 'Inter', sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    background:
      radial-gradient(circle at 1.5px 1.5px, rgba(230,232,238,0.06) 1.5px, transparent 0) 0 0/28px 28px,
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.65;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--accent-dim); color:var(--accent); }

  /* ---------- nav ---------- */
  nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(15,17,23,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1140px; margin:0 auto; padding:0 48px;
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
  }
  .back-link{ font-size:14px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; gap:6px; transition:color .15s ease; }
  .back-link:hover{ color:var(--accent); }
  .nav-cta{ font-size:13.5px; font-weight:600; color:var(--text-muted); }
  .nav-cta:hover{ color:var(--accent); }

  /* ---------- layout ---------- */
  .page{ max-width:1140px; margin:0 auto; padding:120px 48px 100px; display:grid; grid-template-columns:220px 1fr; gap:64px; }
  @media(max-width:860px){ .page{ grid-template-columns:1fr; padding:100px 20px 60px; } }

  /* ---------- sidebar toc ---------- */
  .toc{ position:sticky; top:110px; align-self:start; }
  @media(max-width:860px){ .toc{ position:static; margin-bottom:40px; } }
  .toc-label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:16px; }
  .toc a{
    display:block; font-size:14px; color:var(--text-muted); font-weight:500;
    padding:8px 0 8px 16px; border-left:2px solid var(--border);
    transition:color .15s ease, border-color .15s ease;
  }
  .toc a.active{ color:var(--accent); border-color:var(--accent); font-weight:600; }
  .toc a:hover{ color:var(--text); }

  /* ---------- content ---------- */
  .content{ max-width:640px; }
  .title-tag{ font-size:13px; font-weight:600; color:var(--accent2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:12px; }
  h1{ font-size:clamp(28px, 4vw, 40px); font-weight:700; letter-spacing:-0.02em; margin-bottom:20px; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px; }
  .tag{ font-size:12px; font-weight:600; color:var(--accent); background:var(--accent-dim); padding:5px 12px; border-radius:6px; }
  .btn{
    font-size:14px; font-weight:600; padding:11px 20px; border-radius:8px;
    border:1px solid var(--border); display:inline-flex; align-items:center; gap:8px;
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .btn:hover{ transform:translateY(-2px); border-color:var(--accent); color:var(--accent); }
  .cta-row{ margin-bottom:56px; }

  .section{ margin-bottom:48px; scroll-margin-top:110px; }
  .section:last-child{ margin-bottom:0; }
  .section h2{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--accent2); margin-bottom:14px; }
  .section p{ color:var(--text-muted); font-size:15.5px; }
  .section p.placeholder-text{ font-style:italic; opacity:.7; }
  .section ul{ list-style:none; color:var(--text-muted); font-size:15px; }
  .section li{ padding-left:20px; position:relative; margin-bottom:12px; }
  .section li:last-child{ margin-bottom:0; }
  .section li::before{ content:'—'; position:absolute; left:0; color:var(--accent); }
  .section li .feat-label{ color:var(--text); font-weight:600; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="back-link" href="index.html">← Back to home</a>
    <a class="nav-cta" href="index.html#projects">All projects</a>
  </div>
</nav>

<div class="page">
  <aside class="toc">
    <div class="toc-label">On this page</div>
    <a href="#techstack">Tech Stack</a>
    <a href="#overview">Overview</a>
    <a href="#problem">The Problem</a>
    <a href="#features">Features</a>
    <a href="#results">Results & Impact</a>
  </aside>

  <div class="content">
    <div class="title-tag">Project</div>
    <h1 id="proj-title">Loading…</h1>
    <div class="tag-row" id="proj-tags"></div>
    <div class="cta-row">
      <a class="btn" id="proj-github" href="#" target="_blank" rel="noopener">View on GitHub</a>
    </div>

    <div class="section" id="techstack">
      <h2>Tech Stack</h2>
      <div class="tag-row" id="proj-techstack"></div>
    </div>
    <div class="section" id="overview">
      <h2>Overview</h2>
      <p id="proj-overview"></p>
    </div>
    <div class="section" id="problem">
      <h2>The Problem</h2>
      <p id="proj-problem"></p>
    </div>
    <div class="section" id="features">
      <h2>Features</h2>
      <p id="proj-features-intro"></p>
      <ul id="proj-features"></ul>
    </div>
    <div class="section" id="results">
      <h2>Results & Impact</h2>
      <p id="proj-results"></p>
    </div>
  </div>
</div>

<script src="projects-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('p');
  const project = PROJECTS.find(p => p.slug === slug) || PROJECTS[0];

  document.title = `${project.title} — Yashvi Vaghela`;
  document.getElementById('proj-title').textContent = project.title;
  document.getElementById('proj-tags').innerHTML = project.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('proj-techstack').innerHTML = project.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('proj-overview').textContent = project.overview;
  document.getElementById('proj-problem').textContent = project.problem;
  document.getElementById('proj-features-intro').textContent = project.features.intro;
  document.getElementById('proj-features').innerHTML = project.features.bullets
    .map(f => `<li><span class="feat-label">${f.label}</span> ${f.detail}</li>`)
    .join('');

  const resultsEl = document.getElementById('proj-results');
  resultsEl.textContent = project.results;
  if(project.resultsPlaceholder) resultsEl.classList.add('placeholder-text');

  const githubBtn = document.getElementById('proj-github');
  githubBtn.href = project.github;
  if(project.github === '#') githubBtn.textContent = 'GitHub link coming soon';

  // scrollspy for the ToC
  const tocLinks = document.querySelectorAll('.toc a');
  const sections = document.querySelectorAll('.section');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        tocLinks.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.toc a[href="#${entry.target.id}"]`);
        if(active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => io.observe(s));
</script>

</body>
</html>
