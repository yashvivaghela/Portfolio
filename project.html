<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Yashvi Vaghela</title>
<!-- <link rel="icon" type="image/svg+xml" href="favicon.svg"> -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f1117;
    --bg-card: #161922;
    --accent: #e3b23c;
    --accent-dim: #e3b23c33;
    --accent2: #e3b23c;
    --accent2-dim: #e3b23c26;
    --text: #e6e8ee;
    --text-muted: #8b93a7;
    --border: #262b38;
    --sans: 'Inter', sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    background:
      radial-gradient(circle at 1.5px 1.5px, rgba(230,232,238,0.06) 1.5px, transparent 0) 0 0/28px 28px,
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.65;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--accent-dim); color:var(--accent); }

  /* ---------- nav ---------- */
  nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(15,17,23,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1140px; margin:0 auto; padding:0 48px;
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
  }
  .back-link{ font-size:14px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; gap:6px; transition:color .15s ease; }
  .back-link:hover{ color:var(--accent); }
  .nav-cta{ font-size:13.5px; font-weight:600; color:var(--text-muted); }
  .nav-cta:hover{ color:var(--accent); }

  /* ---------- layout ---------- */
  .page{ max-width:1140px; margin:0 auto; padding:120px 48px 100px; display:grid; grid-template-columns:220px 1fr; gap:64px; }
  @media(max-width:860px){ .page{ grid-template-columns:1fr; padding:100px 20px 60px; } }

  /* ---------- sidebar toc ---------- */
  .toc{ position:sticky; top:110px; align-self:start; }
  @media(max-width:860px){ .toc{ position:static; margin-bottom:40px; } }
  .toc-label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:16px; }
  .toc a{
    display:block; font-size:14px; color:var(--text-muted); font-weight:500;
    padding:8px 0 8px 16px; border-left:2px solid var(--border);
    transition:color .15s ease, border-color .15s ease;
  }
  .toc a.active{ color:var(--accent); border-color:var(--accent); font-weight:600; }
  .toc a:hover{ color:var(--text); }

  /* ---------- content ---------- */
  .content{ max-width:640px; }
  .title-tag{ font-size:13px; font-weight:600; color:var(--accent2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:12px; }
  h1{ font-size:clamp(28px, 4vw, 40px); font-weight:700; letter-spacing:-0.02em; margin-bottom:20px; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px; }
  .tag{ font-size:12px; font-weight:600; color:var(--accent); background:var(--accent-dim); padding:5px 12px; border-radius:6px; }
  .btn{
    font-size:14px; font-weight:600; padding:11px 20px; border-radius:8px;
    border:1px solid var(--border); display:inline-flex; align-items:center; gap:9px;
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .btn:hover{ transform:translateY(-2px); border-color:var(--accent); color:var(--accent); }
  .btn svg{ width:16px; height:16px; flex-shrink:0; }
  .cta-row{ margin-bottom:56px; }

  .section{ margin-bottom:52px; scroll-margin-top:110px; }
  .section:last-child{ margin-bottom:0; }
  .section h2{ font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--accent2); margin-bottom:16px; }
  .section > p{ color:#c5cad6; font-size:15.5px; line-height:1.75; }
  .section p.placeholder-text{ font-style:italic; opacity:.7; color:var(--text-muted); }

  /* problem gets a left accent to flag it as the pain point */
  /* #problem p{ border-left:2px solid var(--accent); padding-left:18px; } */

  /* results gets a card treatment as a small "punchline" box */
  #results p{
    background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
    padding:20px; margin:0;
  }

  /* features rendered as bordered blocks instead of a flat bullet list */
  .feat-intro{ margin-bottom:22px; }
  .feat-block{ border-left:2px solid var(--border); padding-left:18px; margin-bottom:22px; transition:border-color .15s ease; }
  .feat-block:hover{ border-color:var(--accent); }
  .feat-block:last-child{ margin-bottom:0; }
  .feat-block .feat-label{ font-size:15.5px; font-weight:700; color:var(--text); margin-bottom:6px; }
  .feat-block .feat-detail{ color:#c5cad6; font-size:14.5px; line-height:1.7; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="back-link" href="index.html">← Back to home</a>
    <a class="nav-cta" href="index.html#projects">All projects</a>
  </div>
</nav>

<div class="page">
  <aside class="toc">
    <div class="toc-label">On this page</div>
    <a href="#techstack">Tech Stack</a>
    <a href="#overview">Overview</a>
    <a href="#problem">The Problem</a>
    <a href="#features">Features</a>
    <a href="#results">Results & Impact</a>
  </aside>

  <div class="content">
    <div class="title-tag">Project</div>
    <h1 id="proj-title">Loading…</h1>
    <!-- <div class="tag-row" id="proj-tags"></div> -->
    <div class="cta-row">
      <a class="btn" id="proj-github" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.79-.25.79-.55 0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.69-1.28-1.69-1.04-.72.08-.7.08-.7 1.15.08 1.76 1.19 1.76 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.26 5.69.41.36.78 1.07.78 2.16 0 1.56-.01 2.82-.01 3.2 0 .31.21.66.8.55C20.21 21.38 23.5 17.07 23.5 12c0-6.27-5.23-11.5-11.5-11.5Z"/></svg>
        <span id="proj-github-label">View on GitHub</span>
      </a>
    </div>

    <div class="section" id="techstack">
      <h2>Tech Stack</h2>
      <div class="tag-row" id="proj-techstack"></div>
    </div>
    <div class="section" id="overview">
      <h2>Overview</h2>
      <p id="proj-overview"></p>
    </div>
    <div class="section" id="problem">
      <h2>The Problem</h2>
      <p id="proj-problem"></p>
    </div>
    <div class="section" id="features">
      <h2>Features</h2>
      <p class="feat-intro" id="proj-features-intro"></p>
      <div id="proj-features"></div>
    </div>
    <div class="section" id="results">
      <h2>Results & Impact</h2>
      <p id="proj-results"></p>
    </div>
  </div>
</div>

<script src="projects-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('p');
  const project = PROJECTS.find(p => p.slug === slug) || PROJECTS[0];

  document.title = `${project.title} — Yashvi Vaghela`;
  document.getElementById('proj-title').textContent = project.title;
  document.getElementById('proj-techstack').innerHTML = project.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('proj-overview').textContent = project.overview;
  document.getElementById('proj-problem').textContent = project.problem;
  document.getElementById('proj-features-intro').textContent = project.features.intro;
  document.getElementById('proj-features').innerHTML = project.features.bullets
    .map(f => `
      <div class="feat-block">
        <div class="feat-label">${f.label}</div>
        <div class="feat-detail">${f.detail}</div>
      </div>
    `)
    .join('');

  const resultsEl = document.getElementById('proj-results');
  const resultsSection = document.getElementById('results');
  const resultsTocLink = document.querySelector('.toc a[href="#results"]');

  if(!project.results || project.resultsPlaceholder){
    resultsSection.style.display = 'none';
    if(resultsTocLink) resultsTocLink.style.display = 'none';
  } else {
    resultsEl.textContent = project.results;
  }

  const githubBtn = document.getElementById('proj-github');
  const ctaRow = document.querySelector('.cta-row');
  if(!project.github || project.github === '#'){
    ctaRow.style.display = 'none';
  } else {
    githubBtn.href = project.github;
  }

  // scrollspy for the ToC
  const tocLinks = document.querySelectorAll('.toc a');
  const sections = document.querySelectorAll('.section');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        tocLinks.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.toc a[href="#${entry.target.id}"]`);
        if(active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => io.observe(s));
</script>

</body>
</html>
